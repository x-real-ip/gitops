apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  labels:
    app: postgresql-database
spec:
  replicas: 1
  serviceName: postgresql-hl
  selector:
    matchLabels:
      app: postgresql-database
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: postgresql-database
    spec:
      containers:
        - name: postgres
          image: docker.io/postgres:18-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: postgresql-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "$POSTGRES_USER" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "$POSTGRES_USER" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits: {}
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: data
              # postgres 18+ moved PGDATA to a version-specific subdir
              # (/var/lib/postgresql/<major>/docker) and its VOLUME to
              # /var/lib/postgresql — mount the parent dir, not /data.
              mountPath: /var/lib/postgresql
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        # Pinned to a specific PV by name rather than a label selector: the
        # `labels:` transformer's includeSelectors doesn't reach into a
        # volumeClaimTemplate nested this deep, so a label-based selector
        # here would silently match ANY app's postgres PV sharing the base's
        # generic "app: postgresql-database" label. volumeName is an exact,
        # unambiguous pin — every consuming app must patch this to match its
        # own (namePrefix-ed) PV name, see README.md.
        volumeName: pv-iscsi-postgresql-db
        accessModes:
          - ReadWriteOnce
        storageClassName: freenas-iscsi-manual-csi
        resources:
          requests:
            storage: 10Gi
