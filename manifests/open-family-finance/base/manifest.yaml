---
kind: PersistentVolume
apiVersion: v1
metadata:
  name: pv-iscsi-open-family-finance-db
  labels:
    app: open-family-finance-database
spec:
  storageClassName: freenas-iscsi-manual-csi
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: org.democratic-csi.node-manual
    readOnly: false
    fsType: xfs
    volumeHandle: pv-iscsi-open-family-finance-db
    volumeAttributes:
      portal: truenas-master.lan.stamx.nl:3260
      iqn: iqn.2005-10.org.freenas.ctl:open-family-finance-db
      lun: "0"
      node_attach_driver: iscsi
      provisioner_driver: node-manual

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
  name: open-family-finance-secrets
spec:
  encryptedData:
    API_TOKEN: 
    DATABASE_URL: 
    POSTGRES_PASSWORD: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
      labels:
        app: open-family-finance
      name: open-family-finance-secrets
    type: Opaque

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: open-family-finance-config
  labels:
    app: open-family-finance
data:
  BACKEND_URL: "http://localhost:8080"
  PORT: "8080"
  LANGUAGE: "nl"
  APP_TITLE: "Financiën"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: open-family-finance-postgresql-env
  labels:
    app: open-family-finance
data:
  POSTGRES_DB: "openfamilyfinance"
  POSTGRES_USER: "openfamilyfinance"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: open-family-finance-postgresql
  labels:
    app: open-family-finance-database
spec:
  replicas: 1
  serviceName: open-family-finance-postgresql-hl
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: open-family-finance-database
  template:
    metadata:
      labels:
        app: open-family-finance-database
    spec:
      containers:
        - name: postgresql
          image: docker.io/postgres:18-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: open-family-finance-postgresql-env
                optional: false
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: open-family-finance-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits: {}
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: data
              mountPath: /var/lib/postgresql
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        selector:
          matchLabels:
            app: open-family-finance-database
        accessModes:
          - ReadWriteOnce
        storageClassName: freenas-iscsi-manual-csi
        resources:
          requests:
            storage: 5Gi

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: open-family-finance
  labels:
    app: open-family-finance
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-family-finance
  template:
    metadata:
      labels:
        app: open-family-finance
    spec:
      containers:
        - name: web
          image: ghcr.io/x-real-ip/open-family-finance-web:latest
          imagePullPolicy: Always
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: open-family-finance-config
                  key: BACKEND_URL
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: open-family-finance-secrets
                  key: API_TOKEN
            - name: LANGUAGE
              valueFrom:
                configMapKeyRef:
                  name: open-family-finance-config
                  key: LANGUAGE
            - name: APP_TITLE
              valueFrom:
                configMapKeyRef:
                  name: open-family-finance-config
                  key: APP_TITLE
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: api
          image: ghcr.io/x-real-ip/open-family-finance-api:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: open-family-finance-config
                  key: PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: open-family-finance-secrets
                  key: DATABASE_URL
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: open-family-finance-secrets
                  key: API_TOKEN
          ports:
            - name: api
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi

---
kind: Service
apiVersion: v1
metadata:
  name: open-family-finance-postgresql-hl
  labels:
    app: open-family-finance-database
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  selector:
    app: open-family-finance-database
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: open-family-finance
  labels:
    app: open-family-finance
spec:
  selector:
    app: open-family-finance
  ports:
    - name: http
      port: 80
      targetPort: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: open-family-finance
  labels:
    app: open-family-finance
spec:
  hostnames:
    - geldzaken.lan.stamx.nl
  parentRefs:
    - name: private
      namespace: gateway-private
      sectionName: https
  rules:
    - backendRefs:
        - name: open-family-finance
          port: 80
